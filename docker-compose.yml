version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: prepagent_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: prepagent_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - DATABASE_NAME=placement_prep
      - JWT_SECRET=supersecretjwtsecretkeyshouldbechangedinproduction123!
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      # Provide keys inside your environment configurations or add them here
      - GEMINI_API_KEY=
      - OPENAI_API_KEY=
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: prepagent_frontend
    restart: always
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  mongo_data:
